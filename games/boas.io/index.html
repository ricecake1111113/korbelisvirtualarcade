<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boas IO — Korbeli's Virtual Arcade</title>

    <link rel="icon" type="image/x-icon" href="../../icon.ico">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="game.css">

    <script src="UnityProgress.js"></script>
    <script src="UnityLoader.js"></script>
    <script src="ui.js"></script>
</head>

<body>
<div class="page">

    <!-- TOPBAR -->
    <div class="topbar">
        <a href="../../index.html" class="topbar-left">
            <img src="../../icon.png" class="topbar-icon">
            <div class="topbar-title">Korbeli's Virtual Arcade</div>
        </a>
        <div class="topbar-right" id="topbar-right"></div>
    </div>

    <!-- GAME HEADER -->
    <div class="game-header">
        <div class="game-header-left">
            <img src="icon.png" class="game-icon" onerror="this.style.display='none'">
            <div>
                <div class="game-title">Boas IO</div>
                <div class="game-subtitle">Multiplayer · Arcade · Snake</div>
            </div>
        </div>
    </div>

    <!-- GAME DESCRIPTION -->
    <div class="game-desc">
        Boas IO description goes here. Tell players what the game is about.
    </div>

    <!-- GAME WRAP -->
    <div class="game-wrap">
        <div class="game-frame">

            <!-- FIXED GAME STAGE (NO WRAPPERS) -->
            <div class="game-stage">

                <!-- CLICK TO PLAY OVERLAY -->
                <div id="loadOverlay" class="game-overlay" onclick="startGame()">
                    <div class="overlay-content">
                        <button>▶ Click to Play</button>
                        <p>Game will load after clicking</p>
                    </div>
                </div>

                <!-- UNITY CONTAINER -->
                <div id="gameContainer"></div>

            </div>

        </div>

        <!-- CONTROLS BAR (pause removed) -->
        <div class="game-controls">
            <div class="game-controls-left">

                <button class="ctrl-btn" id="btn-mute" onclick="toggleMute()" title="Mute">
                    <img src="unmuted.png" id="mute-icon" alt="Mute">
                </button>

            </div>

            <div class="game-controls-right">
                <button class="ctrl-btn" onclick="gameInstance.SetFullscreen(1)" title="Fullscreen">
                    <img src="fullscreen.png" alt="Fullscreen">
                </button>
            </div>
        </div>
    </div>

    <!-- GAME FOOTER -->
    <div class="game-footer">
        <span>Last updated: <strong>March 31, 2026</strong></span>
        <span>All rights belong to the original creator.</span>
    </div>

    <!-- SITE FOOTER -->
    <footer class="footer">
        <img src="../../logoblack.png" class="footer-logo">
        <p>All games belong to their respective creators.</p>
    </footer>

</div>

<script>
/* NAV */
const SECTIONS = [
    { key: 'games', label: 'Games' },
    { key: 'emulators', label: 'Emulators' },
    { key: 'music', label: 'Music' },
];

async function buildNav() {
    let items;
    try {
        const res = await fetch('../../games.json');
        items = await res.json();
    } catch(e) { return; }

    const grouped = {};
    SECTIONS.forEach(s => grouped[s.key] = []);

    items.forEach(item => {
        if (grouped[item.section] !== undefined) {
            grouped[item.section].push(item);
        }
    });

    const navEl = document.getElementById('topbar-right');

    SECTIONS.forEach(s => {
        const sectionItems = grouped[s.key];
        if (!sectionItems.length) return;

        const wrapper = document.createElement('div');
        wrapper.className = 'dropdown';

        const btn = document.createElement('button');
        btn.className = 'dropbtn';
        btn.textContent = s.label + ' ▼';
        btn.onclick = () => {
            window.location.href = '../../index.html#' + s.key + '-section';
        };

        const content = document.createElement('div');
        content.className = 'dropdown-content';

        sectionItems.forEach(item => {
            const a = document.createElement('a');
            a.href = '../../' + item.folder + '/index.html';
            a.textContent = item.name;
            content.appendChild(a);
        });

        wrapper.appendChild(btn);
        wrapper.appendChild(content);
        navEl.appendChild(wrapper);
    });
}

buildNav();

/* UNITY LOAD */
let gameInstance = null;
let gameLoaded = false;

function startGame() {
    document.getElementById("loadOverlay").style.display = "none";

    if (!gameLoaded) {
        gameLoaded = true;

        gameInstance = UnityLoader.instantiate(
            "gameContainer",
            "build.json",
            { onProgress: UnityProgress }
        );
    }
}

/* MUTE */
let muted = false;

function toggleMute() {
    muted = !muted;

    try {
        gameInstance.SendMessage(
            'AudioManager',
            muted ? 'MuteAudio' : 'UnmuteAudio'
        );
    } catch(e) {}

    document.getElementById('mute-icon').src =
        muted ? 'muted.png' : 'unmuted.png';

    document.getElementById('btn-mute')
        .classList.toggle('ctrl-btn--active', muted);
}
</script>

</body>
</html>
