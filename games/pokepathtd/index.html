<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- =============================================
         HOW TO USE THIS TEMPLATE
         =============================================
         1. Fill in the four CONFIG values below.
         2. Save as:
              /games/[game-folder]/index.html
         3. Copy game-frame-template.html to:
              /file/[game-folder]/index.html
            and fill in its CONFIG too.
         4. Put all game files (build.json etc.)
            inside /file/[game-folder]/
         ============================================= -->

    <title>%%GAME_TITLE%% — Korbeli's Virtual Arcade</title>

    <link rel="icon"       type="image/x-icon" href="../../icon.ico">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="game.css">
</head>

<body>
<div class="page">

    <!-- TOPBAR -->
    <div class="topbar">
        <a href="../../" class="topbar-left">
            <img src="../../icon.png" class="topbar-icon">
            <div class="topbar-title">Korbeli's Virtual Arcade</div>
        </a>
        <div class="topbar-right" id="topbar-right"></div>
    </div>

    <!-- GAME HEADER -->
    <div class="game-header">
        <div class="game-header-left">
            <img src="icon.png" class="game-icon" onerror="this.style.display='none'">
            <div>
                <div class="game-title">%%GAME_TITLE%%</div>
                <div class="game-subtitle">%%GAME_TAGS%%</div>
                <!-- Example: Fake Multiplayer · Arcade · Snake -->
            </div>
        </div>
    </div>

    <!-- GAME DESCRIPTION -->
    <div class="game-desc">
        %%GAME_DESCRIPTION%%
    </div>

    <!-- GAME WRAP -->
    <div class="game-wrap">
        <div class="game-frame">
            <div class="game-stage">

                <div id="loadOverlay" class="game-overlay" onclick="activateGame()">
                    <div class="overlay-content">
                        <button>&#9654; Click to Play</button>
                        <p>Game will load after clicking</p>
                    </div>
                </div>

                <!-- No src until user clicks — keeps page fast -->
                <iframe
                    id="gameFrame"
                    allowfullscreen
                    allow="autoplay; fullscreen"
                    style="width:100%;height:100%;border:none;display:block;"
                ></iframe>

            </div>
        </div>

        <!-- CONTROLS -->
        <div class="game-controls">
            <div class="game-controls-left">

                <button class="ctrl-btn" onclick="popOutGame()" title="Pop Out">
                    <img src="window.png" alt="Pop Out">
                </button>

                <button class="ctrl-btn" id="btn-mute" onclick="toggleMute()" title="Mute">
                    <img src="unmuted.png" id="mute-icon" alt="Mute">
                </button>

            </div>
            <div class="game-controls-right">
                <button class="ctrl-btn" onclick="sendToFrame('fullscreen')" title="Fullscreen">
                    <img src="fullscreen.png" alt="Fullscreen">
                </button>
            </div>
        </div>
    </div>

    <!-- GAME FOOTER -->
    <div class="game-footer">
        <span>Last updated: <strong>%%LAST_UPDATED%%</strong></span>
        <span>All rights belong to the original creator.</span>
    </div>

    <!-- SITE FOOTER -->
    <footer class="footer">
        <img src="../../logoblack.png" class="footer-logo">
        <p>All games belong to their respective creators.</p>
    </footer>

</div>

<script>
/* ==============================================
   CONFIG — change these per game
   ============================================== */
const FRAME_SRC   = '../../file/pokepath-td/index.html';
//                                ^^^^^^^^^^^^^^
//                                e.g. boas-io

const IS_POPOUT   = window.opener !== null;
const ARCADE_ROOT = window.location.origin + '/korbelisvirtualarcade/';


/* ==============================================
   NAV
   ============================================== */
const SECTIONS = [
    { key: 'games',     label: 'Games'     },
    { key: 'emulators', label: 'Emulators' },
    { key: 'music',     label: 'Music'     },
];

async function buildNav() {
    let items;
    try {
        const res = await fetch('../../games.json');
        items = await res.json();
    } catch(e) { return; }

    const grouped = {};
    SECTIONS.forEach(s => grouped[s.key] = []);
    items.forEach(item => {
        if (grouped[item.section]) grouped[item.section].push(item);
    });

    const navEl = document.getElementById('topbar-right');
    SECTIONS.forEach(section => {
        const sectionItems = grouped[section.key];
        if (!sectionItems.length) return;

        const wrapper = document.createElement('div');
        wrapper.className = 'dropdown';

        const btn = document.createElement('button');
        btn.className = 'dropbtn';
        btn.textContent = section.label + ' \u25BC';
        btn.onclick = () => {
            window.location.href = ARCADE_ROOT + '#' + section.key + '-section';
        };

        const content = document.createElement('div');
        content.className = 'dropdown-content';

        sectionItems.forEach(item => {
            const a = document.createElement('a');
            a.textContent = item.name;
            a.addEventListener('click', (e) => {
                e.preventDefault();
                window.location.href = IS_POPOUT
                    ? ARCADE_ROOT
                    : '../../' + item.folder + '/';
            });
            content.appendChild(a);
        });

        wrapper.appendChild(btn);
        wrapper.appendChild(content);
        navEl.appendChild(wrapper);
    });
}

buildNav();


/* ==============================================
   GAME ACTIVATION
   ============================================== */
let gameActivated = false;

function activateGame() {
    document.getElementById('loadOverlay').style.display = 'none';
    const frame = document.getElementById('gameFrame');

    if (!gameActivated) {
        gameActivated = true;
        frame.src = FRAME_SRC;
        frame.addEventListener('load', () => sendToFrame('start'), { once: true });
    } else {
        sendToFrame('start');
    }
}


/* ==============================================
   CROSS-FRAME MESSAGING
   ============================================== */
function sendToFrame(msg) {
    const frame = document.getElementById('gameFrame');
    if (frame && frame.contentWindow) {
        frame.contentWindow.postMessage(msg, '*');
    }
}


/* ==============================================
   POP OUT — opens the frame file directly
   ============================================== */
function popOutGame() {
    window.open(FRAME_SRC, '_blank', 'noopener,noreferrer');
}


/* ==============================================
   MUTE
   ============================================== */
let muted = false;

function toggleMute() {
    muted = !muted;
    sendToFrame(muted ? 'mute' : 'unmute');
    document.getElementById('mute-icon').src = muted ? 'muted.png' : 'unmuted.png';
    document.getElementById('btn-mute').classList.toggle('ctrl-btn--active', muted);
}
</script>

</body>
</html>
