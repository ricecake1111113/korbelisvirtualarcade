<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Game Hub</title>
<link rel="stylesheet" href="game.css">
</head>

<body>

<!-- MAIN PAGE -->
<div class="page">

    <div class="section-header">
        <div class="section-header-label">FEATURED GAME</div>
        <div class="section-header-rule"></div>
    </div>

    <!-- GAME TILE -->
    <div style="padding:20px; text-align:center;">
        <button class="launch-game-btn" onclick="openGame()">
            ▶ PLAY GAME
        </button>
    </div>

</div>

<!-- GAME MODAL -->
<div id="gameModal" class="game-modal">
    <div class="game-box">

        <button class="close-btn" onclick="closeGame()">✕</button>

        <div class="play-overlay" id="overlay">
            <button class="play-button" onclick="startGame()">START</button>
        </div>

        <iframe id="gameFrame" src=""></iframe>

    </div>
</div>

<script>
const GAME_URL = "about:blank"; 
// ↑ replace with your actual game like:
// "fnae/index.html" or "https://..."

function openGame() {
    document.getElementById("gameModal").classList.add("active");
}

function closeGame() {
    document.getElementById("gameModal").classList.remove("active");
    document.getElementById("gameFrame").src = "";
}

function startGame() {
    const frame = document.getElementById("gameFrame");
    frame.src = GAME_URL;

    document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
