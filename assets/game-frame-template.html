<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>%%GAME_TITLE%%</title>

    <!-- =============================================
         HOW TO USE THIS TEMPLATE
         =============================================
         1. Drop this file into /file/[game-folder]/
            and rename/keep as index.html.
         2. Put all game files in the same folder:
              build.json, UnityLoader.js,
              UnityProgress.js, ui.js, etc.
         3. Update BUILD_FILE below if your main
            build file isn't called build.json.
         4. If your game uses extra JS callbacks
            beyond the stubs already here, add them
            in the GAME CALLBACKS section.
         ============================================= -->

    <script src="UnityProgress.js"></script>
    <script src="UnityLoader.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #gameContainer {
            position: absolute !important;
            inset: 0 !important;
            width: 100% !important;
            height: 100% !important;
        }

        #gameContainer canvas {
            position: absolute !important;
            inset: 0 !important;
            width: 100% !important;
            height: 100% !important;
            display: block !important;
        }
    </style>
</head>
<body>

    <div id="gameContainer"></div>

    <script>
        /* ==============================================
           CONFIG — change this per game
           ============================================== */
        const BUILD_FILE = 'build.json';
        //                  ^^^^^^^^^^^
        //                  main Unity build manifest


        /* ==============================================
           AD STATUS CONSTANTS
           (safe to keep even if game has no ads)
           ============================================== */
        var AD_STATUS = {
            NONE:           0,
            CLOSE_FINISHED: 1,
            CLOSE_ABORTED:  2,
            ERROR:          3,
        };


        /* ==============================================
           UNITY LOADER STUBS
           Required so UnityLoader doesn't throw on load
           ============================================== */
        function onGameLoaded() {}
        function onShowUI()     {}
        function onHideUI()     {}
        function hideProgress() {}
        function getFetchResult() { return true; }


        /* ==============================================
           GAME CALLBACKS
           Unity calls these from inside the game.
           Add any extras your specific game needs here.
           ============================================== */
        function sendClickEvent(category, label) {}

        function StartGame(target) {
            try {
                gameInstance.SendMessage('GameManager', 'StartGame', parseInt(target, 10));
            } catch(e) {}
        }

        function playButtonClicked(from) {
            StartGame(from);
        }

        /* Ad stub — instantly signals CLOSE_FINISHED so
           game never freezes waiting for a real ad.      */
        var rewardedAdFrom = 0;
        function showVideoAd(from) {
            rewardedAdFrom = from;
            try {
                gameInstance.SendMessage(
                    'WebGLAdManager',
                    'FireWebAdEvent',
                    AD_STATUS.CLOSE_FINISHED + '/' + rewardedAdFrom
                );
            } catch(e) {}
        }


        /* ==============================================
           XHR INTERCEPTOR
           Fixes no-cache path for local dev servers.
           Safe to leave in for all games.
           ============================================== */
        (function() {
            const _open = XMLHttpRequest.prototype.open;
            XMLHttpRequest.prototype.open = function(method, url, ...rest) {
                if (url && url.includes('no-cache')) {
                    url = url.replace('no-cache', 'supertest/boasmaybe/no-cache');
                }
                return _open.apply(this, [method, url, ...rest]);
            };
        })();


        /* ==============================================
           CORE
           ============================================== */
        let gameInstance = null;
        let gameLoaded   = false;
        let muted        = false;

        function startGame() {
            if (gameLoaded) return;
            gameLoaded = true;
            gameInstance = UnityLoader.instantiate(
                'gameContainer',
                BUILD_FILE,
                { onProgress: UnityProgress }
            );
        }

        function setMute(state) {
            muted = state;
            try {
                gameInstance.SendMessage(
                    'AudioManager',
                    muted ? 'MuteAudio' : 'UnmuteAudio'
                );
            } catch(e) {}
        }

        function goFullscreen() {
            const el = document.documentElement;
            const req = el.requestFullscreen
                     || el.webkitRequestFullscreen
                     || el.mozRequestFullScreen
                     || el.msRequestFullscreen;
            if (req) req.call(el);
        }

        /* Auto-start when opened standalone (pop out / direct URL) */
        if (window.opener === null && window.parent === window) {
            startGame();
        }

        /* Listen for commands from the parent page */
        window.addEventListener('message', ({ data }) => {
            switch (data) {
                case 'start':      startGame();    break;
                case 'mute':       setMute(true);  break;
                case 'unmute':     setMute(false); break;
                case 'fullscreen': goFullscreen(); break;
            }
        });
    </script>

</body>
</html>
